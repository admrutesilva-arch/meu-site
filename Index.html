<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Simulador de Decoração Profissional - Rute</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root{
      --primary-light:#4299e1; --primary-dark:#0c4a6e;
      --bg1:#f8f9fb; --bg2:#ffffff; --text:#0b1220;
      --accent:#10b981; --danger:#ef4444;
    }
    *{box-sizing:border-box}
    body{font-family:Poppins, sans-serif;margin:0;background:var(--bg1);color:var(--text);overflow-x:hidden;}

    /* Modal */
    #modal-welcome {
        position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
        z-index:9999; display:flex; align-items:center; justify-content:center;
    }
    .modal-box {
        background:#fff; padding:30px; border-radius:20px; text-align:center; max-width:400px;
        box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    /* Banners */
    .banner-img{width:100%; display:block; height:auto; margin-bottom:5px;}
    
    /* Palco */
    #stage {
        position:relative; width:95%; height:550px; background:#fff; border:4px solid var(--primary-light); 
        border-radius:15px; margin:20px auto; overflow:hidden; touch-action:none;
    }
    #main-bg{width:100%; height:100%; object-fit:cover; display:none;}
    .dec-item{position:absolute; cursor:grab; user-select:none; z-index:10;}
    .dec-item img { display:block; pointer-events:none; width:150px; }
    .dec-item.selected { outline:2px dashed var(--primary-light); }

    /* Controles e Carrosséis */
    .controls-panel { max-width:1000px; margin:20px auto; background:#fff; border-radius:15px; padding:20px; }
    .carousel-track { display:flex; gap:15px; padding:10px; overflow-x:auto; scrollbar-width:none; }
    .item-img { flex:0 0 100px; height:100px; object-fit:contain; background:#f0f4f8; border-radius:10px; cursor:pointer; }
    
    .btn-action { padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; background:var(--primary-dark); color:white; }
    .status-msg{font-weight:bold; text-align:center; height:24px; margin:10px;}
    .text-blue{color:#3b82f6;}
</style>
</head>
<body>

<div id="modal-welcome">
    <div class="modal-box">
        <h2 style="font-family:'Playfair Display'">Bem-vinda(o)!</h2>
        <p>Pronto(a) para criar o ambiente dos seus sonhos? Vamos começar!</p>
        <button onclick="closeModal()" class="btn-action">Entrar no Simulador</button>
    </div>
</div>

<div id="banner-container"></div>

<section style="padding:20px; text-align:center;">
    <div id="status-display" class="status-msg"></div>
    <label class="btn-action">
        🏠 Foto do Ambiente <input type="file" id="up-fundo" hidden onchange="processFile('bg')">
    </label>
</section>

<div id="stage">
    <img id="main-bg">
    <div id="canvas-layers" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
</div>

<div class="controls-panel">
    <button onclick="updateItem('scale', 1.1)" class="btn-action" style="background:#eee; color:#333;">➕ Aumentar</button>
    <button onclick="updateItem('scale', 0.9)" class="btn-action" style="background:#eee; color:#333;">➖ Diminuir</button>
    <button onclick="deleteItem()" class="btn-action" style="background:#fee2e2; color:#b91c1c;">Excluir</button>
</div>

<div id="carrosseis-container"></div>

// Carregar Banners
const bCont = document.getElementById('banner-container');
LINKS.banners.forEach(url => bCont.innerHTML += `<img src="${url}" class="banner-img">`);

// Carregar Carrosséis com títulos
const labels = {
    biblioteca: "🪑 Biblioteca de Móveis",
    papel_de_parede: "🎨 Papel de Parede",
    portas_e_janelas: "🚪 Portas e Janelas",
    pisos: "🪵 Pisos",
    temas_festas: "🎂 Temas de Festas",
    decoracao_festas: "🎈 Decoração de Festas"
};

const carCont = document.getElementById('carrosseis-container');
for(let k in labels){
    let html = `<h3 style="margin:20px 10px 5px; font-family:'Playfair Display'">${labels[k]}</h3>`;
    html += `<div class="carousel-track">`;
    LINKS[k].forEach(img => html += `<img src="${img}" class="item-img" onclick="addToStage('${img}')">`);
    html += `</div>`;
    carCont.innerHTML += html;
}

// Funções do Simulador
function closeModal() { document.getElementById('modal-welcome').style.display='none'; }

function processFile(type) {
    const reader = new FileReader();
    reader.onload = (e) => {
        if(type === 'bg') {
            const img = document.getElementById('main-bg');
            img.src = e.target.result; img.style.display = 'block';
        }
    }
    reader.readAsDataURL(document.getElementById('up-fundo').files[0]);
}

function addToStage(url) {
    const div = document.createElement('div');
    div.className = 'dec-item';
    div.innerHTML = `<img src="${url}">`;
    document.getElementById('canvas-layers').appendChild(div);
    makeDraggable(div);
    selectItem(div);
}

function makeDraggable(el) {
    let p1=0, p2=0, p3=0, p4=0;
    el.onmousedown = (e) => {
        selectItem(el);
        p3 = e.clientX; p4 = e.clientY;
        document.onmousemove = (ev) => {
            p1 = p3 - ev.clientX; p2 = p4 - ev.clientY;
            p3 = ev.clientX; p4 = ev.clientY;
            el.style.top = (el.offsetTop - p2) + "px";
            el.style.left = (el.offsetLeft - p1) + "px";
        };
        document.onmouseup = () => { document.onmousemove = null; };
    };
}

function selectItem(el) {
    if(selectedItem) selectedItem.classList.remove('selected');
    selectedItem = el;
    selectedItem.classList.add('selected');
}

function updateItem(type, val) {
    if(!selectedItem) return;
    if(type === 'scale') selectedItem.style.width = (selectedItem.offsetWidth * val) + "px";
}

function deleteItem() { if(selectedItem) selectedItem.remove(); }
</script>
